<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tui · Iut</title>
<style>
  :root{
    --bg: #0a0908;
    --bg-elev: #121110;
    --gold: #c9a24d;
    --gold-dim: rgba(201,162,77,0.35);
    --teal: #2a9d8f;
    --teal-dim: rgba(42,157,143,0.35);
    --ink: #ece6da;
    --ink-dim: #8a8378;
    --card-line: rgba(201,162,77,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink); overflow-x:hidden;}
  body{
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height:100vh;
  }

  /* ===== Header ===== */
  header{
    padding: 48px 20px 28px;
    text-align:center;
    position:relative;
  }
  header::before{
    content:"";
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:1px; height:26px; background:linear-gradient(var(--gold), transparent);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.35em;
    color:var(--teal);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  h1{
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight:600;
    font-size: clamp(34px, 7vw, 58px);
    margin:0;
    letter-spacing:0.06em;
    background: linear-gradient(120deg, var(--gold), #efe0b8 45%, var(--teal));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .sub{
    margin-top:10px;
    font-size:13px;
    color:var(--ink-dim);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.05em;
  }

  /* ===== Grid ===== */
  #gallery{
    max-width: 1180px;
    margin: 0 auto;
    padding: 10px 18px 60px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    gap: 22px 16px;
    min-height: 40vh;
  }
  .card{
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
    opacity:0;
    transform: translateY(6px);
    animation: rise 0.45s ease forwards;
  }
  @keyframes rise{ to{ opacity:1; transform:translateY(0);} }

  .avatar{
    width:100%;
    aspect-ratio:1/1;
    border-radius:50%;
    position:relative;
    padding:3px;
    background: conic-gradient(from 180deg, var(--gold), var(--teal), var(--gold));
    transition: transform 0.35s ease, filter 0.35s ease;
  }
  .card:hover .avatar{
    transform: scale(1.045);
    filter: drop-shadow(0 0 14px var(--gold-dim));
  }
  .avatar-inner{
    width:100%; height:100%;
    border-radius:50%;
    overflow:hidden;
    background: var(--bg-elev);
    border: 2px solid var(--bg);
  }
  .avatar img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    opacity:0;
    transition: opacity 0.5s ease;
  }
  .avatar img.loaded{ opacity:1; }
  .avatar .ph{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
  }
  .card-label{
    margin-top:8px;
    font-size:12px;
    color: var(--ink-dim);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.03em;
  }
  .card-name{
    margin-top: 18px;
    margin-bottom: 2px;
    font-family:'Cormorant Garamond', serif;
    font-size:20px;
    letter-spacing:0.08em;
    color: var(--gold);
    text-align:center;
    grid-column: 1/-1;
    border-top: 1px solid var(--card-line);
    padding-top: 22px;
  }

  /* ===== Pagination ===== */
  #pagination{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    padding: 10px 20px 60px;
    max-width: 900px;
    margin: 0 auto;
  }
  .pg-btn{
    min-width:38px;
    height:38px;
    padding:0 10px;
    border-radius:10px;
    border:1px solid var(--card-line);
    background: rgba(255,255,255,0.02);
    color: var(--ink-dim);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    cursor:pointer;
    transition: all 0.2s ease;
  }
  .pg-btn:hover{ border-color: var(--gold-dim); color: var(--ink); }
  .pg-btn.active{
    background: linear-gradient(120deg, var(--gold), var(--teal));
    color: #0a0908;
    font-weight:600;
    border-color: transparent;
  }
  .pg-ellipsis{
    display:flex; align-items:center; color: var(--ink-dim); padding:0 4px;
    font-family:'JetBrains Mono', monospace;
  }

  /* ===== Lightbox ===== */
  #lightbox{
    position:fixed; inset:0;
    background: rgba(6,5,4,0.97);
    display:none;
    align-items:center; justify-content:center;
    z-index:1000;
    touch-action: none;
  }
  #lightbox.open{ display:flex; }
  #lightbox img{
    max-width:92vw; max-height:86vh;
    object-fit:contain;
    border-radius: 6px;
    box-shadow: 0 0 60px rgba(201,162,77,0.12);
    user-select:none;
  }
  #lightbox .lb-close, #lightbox .lb-nav{
    position:absolute;
    color: var(--ink);
    background: rgba(255,255,255,0.04);
    border:1px solid var(--card-line);
    width:44px; height:44px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:20px;
    transition: border-color 0.2s;
  }
  #lightbox .lb-close:hover, #lightbox .lb-nav:hover{ border-color: var(--gold); }
  .lb-close{ top:22px; right:22px; }
  .lb-prev{ left:16px; top:50%; transform:translateY(-50%); }
  .lb-next{ right:16px; top:50%; transform:translateY(-50%); }
  .lb-counter{
    position:absolute; bottom:22px; left:50%; transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color: var(--ink-dim); letter-spacing:0.05em;
  }
  @media (max-width:640px){
    .lb-prev, .lb-next{ width:38px; height:38px; }
  }

  footer{
    text-align:center;
    padding: 30px 20px 50px;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color: var(--ink-dim);
    letter-spacing:0.08em;
  }
</style>
</head>

  // Convert a GitHub "blob" URL into a raw.githubusercontent.com URL for actual <img> loading.
  function toRawUrl(filename){
    return BASE_URL
      .replace("github.com", "raw.githubusercontent.com")
      .replace("/blob/", "/") + filename;
  }

  // Build the display model: a flat list of { name|null, file }
  function buildModel(entries){
    const model = [];
    let activeName = null;
    for(const entry of entries){
      if(typeof entry === "string"){
        model.push({ name: activeName, file: entry });
      } else if(entry && typeof entry === "object"){
        if(entry.name) activeName = entry.name;
        if(entry.file) model.push({ name: activeName, file: entry.file });
      }
    }
    return model;
  }

  const MODEL = buildModel(RAW_ENTRIES);

  // ============================================================
  // PAGINATION + VIRTUALIZATION
  // ============================================================
  const PAGE_SIZE = 30;
  const TOTAL_PAGES = Math.max(1, Math.ceil(MODEL.length / PAGE_SIZE));
  let currentPage = 1;
  let currentObserver = null;

  const galleryEl = document.getElementById("gallery");
  const paginationEl = document.getElementById("pagination");
  const metaLine = document.getElementById("metaLine");

  metaLine.textContent = `${MODEL.length} profiles · ${TOTAL_PAGES} pages`;

  function renderPage(page){
    page = Math.min(Math.max(1, page), TOTAL_PAGES);
    currentPage = page;

    // --- UNLOAD previous page: disconnect observer, clear DOM/img sources ---
    if(currentObserver){
      currentObserver.disconnect();
      currentObserver = null;
    }
    // Explicitly null out image src to release decoded bitmaps before clearing
    galleryEl.querySelectorAll("img").forEach(img => { img.src = ""; });
    galleryEl.innerHTML = "";

    const start = (page - 1) * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, MODEL.length);
    const slice = MODEL.slice(start, end);

    let lastHeader = null;
    const frag = document.createDocumentFragment();

    slice.forEach((item, i) => {
      if(item.name && item.name !== lastHeader){
        const h = document.createElement("div");
        h.className = "card-name";
        h.textContent = item.name;
        frag.appendChild(h);
        lastHeader = item.name;
      }

      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = (i * 0.012) + "s";
      card.dataset.index = start + i;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      const inner = document.createElement("div");
      inner.className = "avatar-inner";
      const ph = document.createElement("div");
      ph.className = "ph";
      ph.textContent = "···";
      inner.appendChild(ph);
      avatar.appendChild(inner);
      card.appendChild(avatar);

      if(item.name){
        const label = document.createElement("div");
        label.className = "card-label";
        label.textContent = item.name;
        card.appendChild(label);
      }

      card.addEventListener("click", () => openLightbox(start + i));
      card.dataset.file = item.file;
      frag.appendChild(card);
    });

    galleryEl.appendChild(frag);

    // --- Load ALL images belonging to THIS page immediately. ---
    // (Virtualization boundary is the PAGE itself — 30 photos at a time —
    // so once a page is opened, every photo on it loads right away instead
    // of trickling in as you scroll.)
    galleryEl.querySelectorAll(".card").forEach(cardEl => {
      const inner = cardEl.querySelector(".avatar-inner");
      const file = cardEl.dataset.file;
      const img = new Image();
      img.decoding = "async";
      img.alt = "profile";
      img.onload = () => {
        inner.innerHTML = "";
        inner.appendChild(img);
        requestAnimationFrame(() => img.classList.add("loaded"));
      };
      img.onerror = () => {
        const ph = inner.querySelector(".ph");
        if(ph) ph.textContent = "×";
      };
      img.src = toRawUrl(file);
    });

    renderPagination(page);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderPagination(page){
    paginationEl.innerHTML = "";
    const addBtn = (label, target, active=false) => {
      const b = document.createElement("button");
      b.className = "pg-btn" + (active ? " active" : "");
      b.textContent = label;
      b.addEventListener("click", () => renderPage(target));
      paginationEl.appendChild(b);
    };
    const addDots = () => {
      const d = document.createElement("div");
      d.className = "pg-ellipsis";
      d.textContent = "···";
      paginationEl.appendChild(d);
    };

    const windowSize = 2;
    const pagesToShow = new Set([1, TOTAL_PAGES]);
    for(let p = page - windowSize; p <= page + windowSize; p++){
      if(p >= 1 && p <= TOTAL_PAGES) pagesToShow.add(p);
    }
    const sorted = [...pagesToShow].sort((a,b) => a-b);

    let prevP = 0;
    for(const p of sorted){
      if(prevP && p - prevP > 1) addDots();
      addBtn(p, p, p === page);
      prevP = p;
    }
  }

  // ============================================================
  // LIGHTBOX
  // ============================================================
  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbCounter = document.getElementById("lbCounter");
  let lbIndex = 0;
  let pageStart = 0, pageEnd = 0;

  function openLightbox(globalIndex){
    pageStart = (currentPage - 1) * PAGE_SIZE;
    pageEnd = Math.min(pageStart + PAGE_SIZE, MODEL.length);
    lbIndex = globalIndex;
    showLightboxImage();
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
  }
  function closeLightbox(){
    lb.classList.remove("open");
    lbImg.src = "";
    document.body.style.overflow = "";
  }
  function showLightboxImage(){
    const item = MODEL[lbIndex];
    lbImg.src = toRawUrl(item.file);
    lbCounter.textContent = `${lbIndex - pageStart + 1} / ${pageEnd - pageStart}  ·  page ${currentPage}`;
  }
  function lbNext(){
    lbIndex = lbIndex + 1 >= pageEnd ? pageStart : lbIndex + 1;
    showLightboxImage();
  }
  function lbPrev(){
    lbIndex = lbIndex - 1 < pageStart ? pageEnd - 1 : lbIndex - 1;
    showLightboxImage();
  }

  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  document.getElementById("lbNext").addEventListener("click", lbNext);
  document.getElementById("lbPrev").addEventListener("click", lbPrev);
  lb.addEventListener("click", (e) => { if(e.target === lb) closeLightbox(); });

  document.addEventListener("keydown", (e) => {
    if(!lb.classList.contains("open")) return;
    if(e.key === "Escape") closeLightbox();
    if(e.key === "ArrowRight") lbNext();
    if(e.key === "ArrowLeft") lbPrev();
  });

  // touch swipe
  let touchStartX = 0;
  lb.addEventListener("touchstart", (e) => { touchStartX = e.touches[0].clientX; }, {passive:true});
  lb.addEventListener("touchend", (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 40){ dx > 0 ? lbPrev() : lbNext(); }
  }, {passive:true});

  // ============================================================
  // INIT
  // ============================================================
  renderPage(1);
</script>
